<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="text" name="display" class="display" />
<div class="todos">
    <div class="numeros">
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <br />
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <br />
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <br />
      <button>0</button>
      <button>/</button>
      <button>=</button>
    </div>
    <div class="operadores">
      <button>+</button>
      <button>-</button>
      <button>*</button>
      
    </div>
</div>
  </body>
</html>
